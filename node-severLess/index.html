<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <script>
            fetch("https://node-serverless-xsapigkyae.cn-beijing.fcapp.run", {
                method: "POST",
                body: JSON.stringify({
                    name: "John",
                    age: 30,
                }),
            })
                .then((response) => response.json())
                .then((data) => console.log(data))
                .catch((error) => console.error("Error:", error));
        </script>
    </body>
</html>
